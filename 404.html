<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404</title>
    <link rel="stylesheet" href="/POS-GAS/frontend/css/404.css"/>
  </head>
  <body>
    <img
      src="/POS-GAS/frontend/assets/robot.png"
      alt="404 Error Image"
      class="error-image"
    />
    <h1>Oops! Page Not Found</h1>
    <p>Please check the URL or try navigating from the homepage.</p>

    <button onclick="goBack()">Go Back</button>

    <script>
      function goBack() {
        // Fade out the page first
        document.body.style.opacity = "0";

        // Delay navigation to allow animation to complete
        setTimeout(() => {
          if (window.history.length > 1) {
            window.history.back();
          } else {
            window.location.href = "/POS-GAS/";
          }
        }, 500); // matches CSS transition duration
      }
    </script>
  </body>
</html>
